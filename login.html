<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Be still — sign in</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sage: #6B7C5E;
  --sage-dark: #4A5940;
  --sage-light: #EEF1EB;
  --cream: #FAF8F4;
  --cream-dark: #F0EDE6;
  --ink: #1E2219;
  --ink-muted: #5A6356;
  --ink-faint: #9CA896;
  --white: #FFFFFF;
  --border: rgba(90,99,86,0.15);
  --border-mid: rgba(90,99,86,0.28);
  --shadow-md: 0 4px 24px rgba(30,34,25,0.10);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --font-display: 'Cormorant Garamond', serif;
  --font-body: 'DM Sans', sans-serif;
}

html, body {
  height: 100%;
  background: var(--cream);
  font-family: var(--font-body);
  color: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* subtle dot-grid background */
body {
  background-image: radial-gradient(var(--sage-light) 1px, transparent 1px);
  background-size: 28px 28px;
}

.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 2.75rem 2.5rem 2.25rem;
  width: 100%;
  max-width: 380px;
  box-shadow: var(--shadow-md);
  animation: fadeUp 0.3s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

.brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  margin-bottom: 2rem;
}

.brand-icon {
  width: 44px; height: 44px;
  background: var(--sage);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
}
.brand-icon svg { width: 22px; height: 22px; fill: #E8EDE3; }

.brand-name {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 500;
  font-style: italic;
  color: var(--ink);
  letter-spacing: 0.01em;
}

.brand-tagline {
  font-size: 12px;
  color: var(--ink-faint);
  margin-top: -6px;
  font-family: var(--font-display);
  font-style: italic;
}

.form-group {
  margin-bottom: 14px;
}

.form-label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 5px;
}

.input-wrap {
  position: relative;
}

.form-input {
  width: 100%;
  padding: 10px 38px 10px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-mid);
  font-size: 14px;
  font-family: var(--font-body);
  color: var(--ink);
  background: var(--white);
  outline: none;
  transition: border-color 0.15s;
}
.form-input:focus { border-color: var(--sage); }
.form-input.error { border-color: #D85A30; }

.toggle-pw {
  position: absolute;
  right: 10px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  cursor: pointer;
  color: var(--ink-faint);
  display: flex; align-items: center;
  padding: 2px;
  transition: color 0.15s;
}
.toggle-pw:hover { color: var(--ink-muted); }
.toggle-pw svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.7; }

.error-msg {
  display: none;
  font-size: 12px;
  color: #993C1D;
  margin-top: 12px;
  text-align: center;
  background: #FAECE7;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(216,90,48,0.2);
}
.error-msg.show { display: block; }

.btn-login {
  width: 100%;
  padding: 11px;
  margin-top: 20px;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--sage);
  color: #E8EDE3;
  font-size: 14px;
  font-weight: 500;
  font-family: var(--font-body);
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  letter-spacing: 0.02em;
}
.btn-login:hover { background: var(--sage-dark); }
.btn-login:active { transform: scale(0.99); }
.btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

.divider {
  margin: 1.5rem 0 0;
  border: none;
  border-top: 1px solid var(--border);
}

.footer-note {
  text-align: center;
  font-size: 11px;
  color: var(--ink-faint);
  margin-top: 1rem;
  font-family: var(--font-display);
  font-style: italic;
}

@media (max-width: 420px) {
  .card { margin: 1rem; padding: 2rem 1.5rem 1.75rem; }
}
</style>
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 16 16"><path d="M8 2a6 6 0 100 12A6 6 0 008 2zm.6 3v3.4l2.2 1.3-.6 1-2.6-1.6V5h1z"/></svg>
    </div>
    <div class="brand-name">Be still</div>
    <div class="brand-tagline">your pace, your space</div>
  </div>

  <div class="form-group">
    <label class="form-label" for="username">Username</label>
    <div class="input-wrap">
      <input class="form-input" type="text" id="username" autocomplete="username" placeholder="Enter your username" />
    </div>
  </div>

  <div class="form-group">
    <label class="form-label" for="password">Password</label>
    <div class="input-wrap">
      <input class="form-input" type="password" id="password" autocomplete="current-password" placeholder="Enter your password" />
      <button class="toggle-pw" type="button" onclick="togglePw()" id="toggle-btn" aria-label="Show password">
        <svg id="eye-icon" viewBox="0 0 16 16">
          <ellipse cx="8" cy="8" rx="6" ry="4"/>
          <circle cx="8" cy="8" r="1.8" fill="currentColor" stroke="none"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="error-msg" id="error-msg">Incorrect username or password. Please try again.</div>

  <button class="btn-login" id="login-btn" onclick="attemptLogin()">Sign in</button>

  <hr class="divider" />
  <p class="footer-note">private access only</p>
</div>

<script>
  const CORRECT_USER = 'bestillmontes';
  const CORRECT_PASS = 'Phillmontesbestill';
  const SESSION_KEY  = 'bestill_auth';

  // Clear any existing session on load (ask every time)
  sessionStorage.removeItem(SESSION_KEY);

  function attemptLogin() {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;
    const btn  = document.getElementById('login-btn');
    const err  = document.getElementById('error-msg');

    // Clear previous errors
    err.classList.remove('show');
    document.getElementById('username').classList.remove('error');
    document.getElementById('password').classList.remove('error');

    if (user === CORRECT_USER && pass === CORRECT_PASS) {
      btn.textContent = 'Signing in...';
      btn.disabled = true;
      sessionStorage.setItem(SESSION_KEY, '1');
      setTimeout(() => { window.location.href = 'index.html'; }, 400);
    } else {
      err.classList.add('show');
      document.getElementById('username').classList.add('error');
      document.getElementById('password').classList.add('error');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();

      // Shake the card
      const card = document.querySelector('.card');
      card.style.animation = 'none';
      card.style.transform = 'translateX(-6px)';
      setTimeout(() => { card.style.transform = 'translateX(6px)'; }, 80);
      setTimeout(() => { card.style.transform = 'translateX(-4px)'; }, 160);
      setTimeout(() => { card.style.transform = 'translateX(0)'; }, 240);
    }
  }

  function togglePw() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('eye-icon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = `<ellipse cx="8" cy="8" rx="6" ry="4"/>
        <line x1="3" y1="3" x2="13" y2="13"/>`;
    } else {
      input.type = 'password';
      icon.innerHTML = `<ellipse cx="8" cy="8" rx="6" ry="4"/>
        <circle cx="8" cy="8" r="1.8" fill="currentColor" stroke="none"/>`;
    }
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') attemptLogin();
  });
</script>
</body>
</html>
